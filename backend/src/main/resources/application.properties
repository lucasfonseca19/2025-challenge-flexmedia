spring.application.name=checkin-hub

# =============================================
# Servidor
# =============================================
server.port=8080

# =============================================
# MySQL Database
# =============================================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/checkinhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${MYSQL_USER:checkinhub}
spring.datasource.password=${MYSQL_PASS:checkinhub123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT
# =============================================
app.jwt.secret=${JWT_SECRET:3cHm9K8vXqL2pN5rT7wZ0jF4dY1sU6bE}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# =============================================
# PMS Adapter (mock | opera | totvs)
# =============================================
app.pms.adapter=${PMS_ADAPTER:mock}

# =============================================
# CORS — origens permitidas
# =============================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

# =============================================
# Actuator (health check)
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
