services:

  # ─── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: checkinhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: checkinhub
      MYSQL_USER: checkinhub
      MYSQL_PASSWORD: checkinhub123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "checkinhub", "-pcheckinhub123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - checkinhub-net

  # ─── Backend Spring Boot ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: checkinhub-backend
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/checkinhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      MYSQL_USER: checkinhub
      MYSQL_PASS: checkinhub123
      JWT_SECRET: 3cHm9K8vXqL2pN5rT7wZ0jF4dY1sU6bE
      JWT_EXPIRATION: "86400000"
      PMS_ADAPTER: mock
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173,http://localhost:5174
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - checkinhub-net

  # ─── Frontend Totem (Nginx) ───────────────────────────────────────────────
  frontend-totem:
    build:
      context: ./frontend-totem
      dockerfile: Dockerfile
    container_name: checkinhub-totem
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - checkinhub-net

  # ─── Frontend Admin (Nginx) ───────────────────────────────────────────────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: checkinhub-admin
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - checkinhub-net

volumes:
  mysql_data:
  backend_uploads:

networks:
  checkinhub-net:
    driver: bridge
